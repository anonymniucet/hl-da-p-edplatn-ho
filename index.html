<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubHlídač — přehled předplatných</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --ink-900:#12171B; --ink-800:#1A2126; --ink-700:#232B31; --ink-600:#323C43;
    --line: rgba(245,240,230,0.09); --line-strong: rgba(245,240,230,0.16);
    --paper:#F5F0E4; --paper-dim:#E8E0CD;
    --text:#EEEAE1; --text-dim:#9CA6AC; --text-faint:#6B747A;
    --amber:#E8A33D; --amber-dim:#8A6A34; --sage:#7FA98D; --coral:#D9695F;
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Inter', -apple-system, sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--ink-900); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased; min-height:100vh; }
  a{ color:inherit; } button{ font-family:inherit; cursor:pointer; } input,select,textarea{ font-family:inherit; }
  ::selection{ background:var(--amber); color:var(--ink-900); }

  .shell{ display:flex; min-height:100vh; }
  .sidebar{ width:232px; flex-shrink:0; background:var(--ink-800); border-right:1px solid var(--line); padding:28px 18px; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; overflow-y:auto; }
  .brand{ display:flex; align-items:center; gap:10px; padding:0 6px 26px; }
  .brand-mark{ width:34px; height:34px; border-radius:50%; background: conic-gradient(from 200deg, var(--amber), var(--coral) 40%, var(--amber)); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:16px; color:var(--ink-900); flex-shrink:0; }
  .brand-text{ font-family:var(--font-display); font-size:19px; font-weight:600; letter-spacing:-0.01em; }
  .nav{ display:flex; flex-direction:column; gap:2px; margin-top:6px; }
  .nav-item{ display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:8px; color:var(--text-dim); font-size:14px; font-weight:500; background:none; border:none; text-align:left; width:100%; transition:background .15s, color .15s; }
  .nav-item svg{ width:17px; height:17px; flex-shrink:0; }
  .nav-item:hover{ background:var(--ink-700); color:var(--text); }
  .nav-item.active{ background:var(--ink-700); color:var(--amber); }
  .nav-badge{ margin-left:auto; font-family:var(--font-mono); font-size:10.5px; background:var(--coral); color:var(--paper); border-radius:20px; padding:1px 6px; font-weight:600; }
  .sidebar-foot{ margin-top:auto; padding-top:18px; display:flex; flex-direction:column; gap:8px; }
  .plan-pill{ display:flex; align-items:center; gap:8px; border:1px solid var(--line-strong); border-radius:10px; padding:10px 12px; font-size:12.5px; color:var(--text-dim); }
  .plan-pill.premium{ border-color:var(--amber-dim); color:var(--amber); }
  .plan-pill svg{ width:14px; height:14px; flex-shrink:0; }
  .user-pill{ font-size:11.5px; color:var(--text-faint); padding:0 2px; word-break:break-all; }
  .logout-btn{ background:none; border:none; color:var(--text-faint); font-size:12px; text-align:left; padding:6px 2px; }
  .logout-btn:hover{ color:var(--coral); }

  .main{ margin-left:232px; flex:1; padding:36px 44px 80px; max-width:1040px; }
  .topbar{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:10px; }
  .page-title{ font-family:var(--font-display); font-size:30px; font-weight:600; letter-spacing:-0.01em; }
  .page-sub{ color:var(--text-dim); font-size:13.5px; margin-top:4px; }
  .btn{ display:inline-flex; align-items:center; gap:7px; border-radius:8px; padding:10px 16px; font-size:13.5px; font-weight:600; border:1px solid transparent; transition:transform .1s, opacity .15s; }
  .btn svg{ width:15px; height:15px; }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--amber); color:var(--ink-900); }
  .btn-primary:hover{ opacity:.9; }
  .btn-ghost{ background:transparent; border-color:var(--line-strong); color:var(--text); }
  .btn-ghost:hover{ border-color:var(--text-dim); }
  .btn-danger{ background:transparent; border-color:var(--coral); color:var(--coral); }
  .btn-danger:hover{ background:rgba(217,105,95,0.1); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }
  .btn-sm{ padding:7px 12px; font-size:12.5px; }
  .btn-block{ width:100%; justify-content:center; }

  .receipt{ background:var(--paper); color:var(--ink-900); border-radius:6px; padding:0 30px 26px; position:relative; margin-bottom:26px; box-shadow:0 20px 40px -20px rgba(0,0,0,0.5); }
  .receipt-perf{ height:12px; margin:0 -30px 8px; background-image: radial-gradient(circle 4px, var(--ink-900) 4px, transparent 4.5px); background-size:20px 12px; background-repeat:repeat-x; background-position:10px 0; opacity:.9; }
  .receipt-top{ display:flex; justify-content:space-between; align-items:flex-start; padding-top:6px; gap:24px; flex-wrap:wrap; }
  .receipt-label{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:#6b6250; margin-bottom:6px; }
  .receipt-num{ font-family:var(--font-display); font-size:52px; font-weight:600; line-height:1; letter-spacing:-0.02em; }
  .receipt-num span{ font-size:20px; font-family:var(--font-mono); font-weight:500; margin-left:4px; }
  .receipt-sub{ font-family:var(--font-mono); font-size:12.5px; color:#6b6250; margin-top:8px; }
  .gauge-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .gauge-caption{ font-family:var(--font-mono); font-size:11px; color:#6b6250; text-align:center; max-width:150px; }
  .receipt-stats{ display:flex; gap:28px; margin-top:22px; padding-top:18px; border-top:1px dashed #c9bfa6; flex-wrap:wrap; }
  .receipt-stat-label{ font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:#6b6250; }
  .receipt-stat-val{ font-family:var(--font-display); font-size:19px; font-weight:600; margin-top:2px; }

  .grid-2{ display:grid; grid-template-columns:1.3fr 1fr; gap:20px; align-items:start; }
  .card{ background:var(--ink-800); border:1px solid var(--line); border-radius:10px; padding:20px 22px; }
  .card-title{ font-family:var(--font-display); font-size:16px; font-weight:600; margin:0 0 4px; }
  .card-desc{ font-size:12.5px; color:var(--text-dim); margin:0 0 14px; }

  .lineitem{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); }
  .lineitem:last-child{ border-bottom:none; }
  .stamp{ width:34px; height:34px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--ink-900); }
  .li-name{ font-weight:600; font-size:14px; }
  .li-meta{ font-size:11.5px; color:var(--text-dim); margin-top:1px; font-family:var(--font-mono); }
  .li-leader{ flex:1; border-bottom:1px dotted var(--line-strong); margin:0 2px; height:1px; align-self:center; min-width:16px; }
  .li-price{ font-family:var(--font-mono); font-weight:600; font-size:14.5px; white-space:nowrap; }
  .li-price small{ font-weight:400; color:var(--text-dim); font-size:11px; }
  .li-actions{ display:flex; gap:4px; margin-left:6px; }
  .icon-btn{ width:28px; height:28px; border-radius:6px; border:1px solid transparent; background:transparent; display:flex; align-items:center; justify-content:center; color:var(--text-dim); }
  .icon-btn:hover{ background:var(--ink-700); color:var(--text); }
  .icon-btn svg{ width:14px; height:14px; }
  .li-tag{ font-family:var(--font-mono); font-size:10px; padding:2px 7px; border-radius:20px; border:1px solid var(--line-strong); color:var(--text-dim); white-space:nowrap; }
  .li-tag.warn{ border-color:var(--amber-dim); color:var(--amber); }
  .li-tag.soon{ border-color:var(--coral); color:var(--coral); }

  .controls-row{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .input, .select{ background:var(--ink-800); border:1px solid var(--line-strong); color:var(--text); border-radius:8px; padding:9px 12px; font-size:13px; outline:none; }
  .input:focus, .select:focus, textarea:focus{ border-color:var(--amber-dim); }
  .search-wrap{ position:relative; flex:1; min-width:180px; }
  .search-wrap svg{ position:absolute; left:11px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text-faint); }
  .search-wrap input{ padding-left:32px; width:100%; }

  .empty{ text-align:center; padding:50px 20px; color:var(--text-dim); }
  .empty svg{ width:34px; height:34px; color:var(--text-faint); margin-bottom:12px; }
  .empty-title{ font-family:var(--font-display); font-size:18px; color:var(--text); margin-bottom:6px; }
  .empty-actions{ display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap; }

  .legend-row{ display:flex; align-items:center; gap:9px; font-size:12.5px; padding:6px 0; }
  .legend-dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .legend-name{ flex:1; color:var(--text-dim); }
  .legend-val{ font-family:var(--font-mono); font-size:12px; }
  .bar-track{ height:6px; background:var(--ink-700); border-radius:4px; overflow:hidden; margin-top:4px; }
  .bar-fill{ height:100%; border-radius:4px; }

  .notif{ display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--line); }
  .notif:last-child{ border-bottom:none; }
  .notif-icon{ width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .notif-icon svg{ width:17px; height:17px; }
  .notif-title{ font-size:14px; font-weight:600; }
  .notif-desc{ font-size:12.5px; color:var(--text-dim); margin-top:2px; }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(10,13,15,0.7); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; animation:fadein .15s ease; }
  @keyframes fadein{ from{opacity:0} to{opacity:1} }
  .modal{ background:var(--ink-800); border:1px solid var(--line-strong); border-radius:14px; width:100%; max-width:460px; max-height:88vh; overflow-y:auto; padding:26px 26px 22px; animation:modalin .18s cubic-bezier(.2,.8,.3,1); }
  @keyframes modalin{ from{opacity:0; transform:translateY(8px) scale(.98)} to{opacity:1; transform:translateY(0) scale(1)} }
  .modal-head{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; }
  .modal-title{ font-family:var(--font-display); font-size:20px; font-weight:600; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; font-weight:500; }
  .field .input, .field .select, .field textarea{ width:100%; }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  textarea{ background:var(--ink-800); border:1px solid var(--line-strong); color:var(--text); border-radius:8px; padding:9px 12px; font-size:13px; resize:vertical; min-height:56px; }
  .cat-picker{ display:flex; flex-wrap:wrap; gap:7px; }
  .cat-chip{ display:flex; align-items:center; gap:6px; padding:6px 11px; border-radius:20px; border:1px solid var(--line-strong); font-size:12px; background:transparent; color:var(--text-dim); }
  .cat-chip.sel{ border-color:var(--amber); color:var(--text); background:var(--ink-700); }
  .cat-chip .dot{ width:8px; height:8px; border-radius:50%; }
  .modal-actions{ display:flex; gap:10px; margin-top:20px; }
  .modal-actions .btn{ flex:1; }

  .plan-cards{ display:flex; gap:12px; margin:16px 0; }
  .plan-card{ flex:1; border:1px solid var(--line-strong); border-radius:12px; padding:16px; }
  .plan-card.hi{ border-color:var(--amber-dim); background:rgba(232,163,61,0.06); }
  .plan-card h4{ font-family:var(--font-display); font-size:16px; margin:0 0 4px; }
  .plan-price{ font-family:var(--font-mono); font-size:13px; color:var(--text-dim); margin-bottom:10px; }
  .plan-card ul{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:7px; }
  .plan-card li{ display:flex; gap:7px; font-size:12.5px; color:var(--text-dim); align-items:flex-start; }
  .plan-card li svg{ width:13px; height:13px; margin-top:1.5px; flex-shrink:0; }
  .plan-card.hi li{ color:var(--text); }
  .demo-note{ font-size:11px; color:var(--text-faint); background:var(--ink-900); border-radius:8px; padding:9px 11px; margin-top:14px; line-height:1.5; }

  .toast-root{ position:fixed; top:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px; }
  .toast{ background:var(--paper); color:var(--ink-900); padding:11px 16px; border-radius:8px; font-size:13px; font-weight:600; box-shadow:0 10px 25px rgba(0,0,0,0.35); animation:toastin .2s ease; max-width:300px; }
  .toast.err{ background:var(--coral); color:var(--paper); }
  @keyframes toastin{ from{opacity:0; transform:translateX(12px)} to{opacity:1; transform:translateX(0)} }

  .kv-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--line); gap:14px; }
  .kv-row:last-child{ border-bottom:none; }
  .kv-label{ font-size:13.5px; font-weight:500; }
  .kv-desc{ font-size:12px; color:var(--text-dim); margin-top:2px; }

  /* auth screen */
  .auth-screen{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .auth-card{ width:100%; max-width:380px; background:var(--ink-800); border:1px solid var(--line-strong); border-radius:14px; padding:30px 28px; }
  .auth-brand{ display:flex; align-items:center; gap:10px; margin-bottom:22px; }
  .auth-tabs{ display:flex; gap:6px; background:var(--ink-900); border-radius:9px; padding:4px; margin-bottom:20px; }
  .auth-tab{ flex:1; text-align:center; padding:8px; border-radius:6px; font-size:13px; font-weight:600; color:var(--text-dim); background:none; border:none; }
  .auth-tab.sel{ background:var(--ink-700); color:var(--text); }
  .auth-error{ background:rgba(217,105,95,0.12); border:1px solid var(--coral); color:var(--coral); font-size:12.5px; border-radius:8px; padding:9px 11px; margin-bottom:14px; }
  .auth-hint{ font-size:11.5px; color:var(--text-faint); margin-top:14px; line-height:1.5; text-align:center; }

  .spinner{ width:16px; height:16px; border-radius:50%; border:2px solid rgba(18,23,27,0.25); border-top-color:var(--ink-900); animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- responsive: tablet ---------- */
  @media (max-width: 860px){
    .sidebar{ position:static; width:100%; flex-direction:row; align-items:center; padding:12px 16px; overflow-x:auto; gap:10px; }
    .brand{ padding:0 14px 0 0; }
    .nav{ flex-direction:row; flex:1; }
    .nav-item span.label-full{ display:none; }
    .nav-item{ width:auto; padding:9px 11px; }
    .sidebar-foot{ margin-top:0; padding-top:0; flex-direction:row; align-items:center; gap:10px; flex-shrink:0; }
    .plan-pill{ padding:7px 10px; font-size:11.5px; }
    .plan-pill span{ display:none; }
    .user-pill{ display:none; }
    .logout-btn{ display:flex; align-items:center; gap:5px; padding:8px; border-radius:8px; }
    .logout-btn:hover{ background:var(--ink-700); }
    .logout-btn svg{ width:16px; height:16px; }
    .main{ margin-left:0; padding:22px 18px 60px; max-width:100%; }
    .grid-2{ grid-template-columns:1fr; }
    .receipt{ padding:0 18px 20px; }
    .receipt-perf{ margin:0 -18px 8px; }
    .receipt-top{ gap:16px; }
  }

  /* ---------- responsive: phone (bottom tab bar) ---------- */
  @media (max-width: 640px){
    .sidebar{ position:fixed; top:0; left:0; right:0; height:auto; z-index:60; background:var(--ink-800); border-bottom:1px solid var(--line); border-right:none; padding:10px 14px; }
    .brand-text{ font-size:16px; }
    .nav{ position:fixed; left:0; right:0; bottom:0; top:auto; flex-direction:row; justify-content:space-around; background:var(--ink-800); border-top:1px solid var(--line); padding:6px 4px calc(6px + env(safe-area-inset-bottom, 0px)); z-index:60; gap:0; }
    .nav-item{ flex-direction:column; gap:3px; flex:1; padding:6px 2px; border-radius:10px; position:relative; }
    .nav-item span.label-full{ display:block; font-size:9.5px; font-weight:600; }
    .nav-badge{ position:absolute; top:2px; right:22%; margin-left:0; }
    .main{ margin-top:54px; padding:18px 14px calc(78px + env(safe-area-inset-bottom, 0px)); }
    .page-title{ font-size:24px; }
    .receipt-num{ font-size:38px; }
    .receipt-num span{ font-size:16px; }
    .receipt-top{ flex-direction:column; align-items:flex-start; }
    .gauge-wrap{ align-self:center; }
    .receipt-stats{ gap:16px 22px; }
  }

  /* ---------- responsive: small phone ---------- */
  @media (max-width: 420px){
    .main{ padding-left:12px; padding-right:12px; }
    .receipt{ padding:0 14px 18px; }
    .receipt-perf{ margin:0 -14px 8px; }
    .card{ padding:16px 14px; }
    .controls-row{ flex-direction:column; }
    .search-wrap{ min-width:100%; }
    .select{ width:100%; }
    .field-row{ flex-direction:column; gap:0; }
    .plan-cards{ flex-direction:column; }
    .modal{ padding:20px 18px 18px; }
    .lineitem{ flex-wrap:wrap; row-gap:8px; }
    .li-leader{ display:none; }
    .li-price{ margin-left:auto; }
    .receipt-stats{ flex-direction:column; gap:12px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-root" id="toastRoot"></div>
<div id="modalRoot"></div>

<script src="config.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ============================= SUPABASE CLIENT ============================= */
const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

/* ============================= CONSTANTS ============================= */
const CATEGORIES = [
  { id:'streaming',  label:'Streaming',        color:'#D9695F' },
  { id:'software',   label:'Software',         color:'#6B8CAE' },
  { id:'hudba',      label:'Hudba',            color:'#B98BC9' },
  { id:'fitness',    label:'Fitness',          color:'#7FA98D' },
  { id:'hry',        label:'Hry',              color:'#E8A33D' },
  { id:'cloud',      label:'Cloud a úložiště', color:'#7FB3D5' },
  { id:'pojisteni',  label:'Pojištění',        color:'#9AA5AE' },
  { id:'ostatni',    label:'Ostatní',          color:'#B0A695' },
];
const CYCLES = [
  { id:'monthly',   label:'měsíčně',    factor:1 },
  { id:'quarterly', label:'čtvrtletně', factor:1/3 },
  { id:'yearly',    label:'ročně',      factor:1/12 },
  { id:'weekly',    label:'týdně',      factor:4.345 },
];
const FREE_LIMIT = 5;
const ICONS = {
  dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>',

/* ============================= STATE ============================= */
let state = {
  ready:false,
  user:null,
  subs:[],
  settings:{ premium:false, monthly_budget:null },
  view:'dashboard',
  search:'',
  filterCategory:'all',
  sortBy:'renewal',
  authMode:'signin',
  authError:'',
  authBusy:false,
};

function catInfo(id){ return CATEGORIES.find(c=>c.id===id) || CATEGORIES[CATEGORIES.length-1]; }
function fmtMoney(n){ return Math.round(n).toLocaleString('cs-CZ') + ' Kč'; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysUntil(dateStr){
  const d1 = new Date(dateStr+'T00:00:00');
  const d2 = new Date(todayStr()+'T00:00:00');
  return Math.round((d1-d2)/86400000);
}
function daysLabel(n){
  if(n<0) return 'Po splatnosti';
  if(n===0) return 'Dnes';
  if(n===1) return 'Zítra';
  if(n>=2 && n<=4) return `Za ${n} dny`;
  return `Za ${n} dní`;
}
function fmtDate(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('cs-CZ', { day:'numeric', month:'numeric', year:'numeric' });
}
function addCycle(dateStr, cycle){
  const d = new Date(dateStr+'T00:00:00');
  if(cycle==='monthly') d.setMonth(d.getMonth()+1);
  else if(cycle==='yearly') d.setFullYear(d.getFullYear()+1);
  else if(cycle==='quarterly') d.setMonth(d.getMonth()+3);
  else if(cycle==='weekly') d.setDate(d.getDate()+7);
  return d.toISOString().slice(0,10);
}
function monthlyEq(sub){
  const c = CYCLES.find(c=>c.id===sub.cycle) || CYCLES[0];
  return sub.price * c.factor;
}
function cycleLabel(id){ return (CYCLES.find(c=>c.id===id)||CYCLES[0]).label; }
function escapeHTML(str){
  return String(str||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ============================= AUTH ============================= */
async function initAuth(){
  const { data:{ session } } = await supabase.auth.getSession();
  state.user = session?.user || null;
  if(state.user) await loadUserData();
  state.ready = true;
  render();

  supabase.auth.onAuthStateChange(async (_event, session)=>{
    const nextUser = session?.user || null;
    const wasLoggedIn = !!state.user;
    state.user = nextUser;
    if(nextUser && !wasLoggedIn){
      await loadUserData();
    } else if(!nextUser){
      state.subs = []; state.settings = { premium:false, monthly_budget:null };
    }
    render();
  });
}
async function handleAuthSubmit(e){
  e.preventDefault();
  const f = e.target;
  const email = f.email.value.trim();
  const password = f.password.value;
  state.authBusy = true; state.authError = ''; render();
  try{
    if(state.authMode === 'signup'){
      const { error } = await supabase.auth.signUp({ email, password });
      if(error) throw error;
      toast('Účet vytvořen. Pokud tvůj projekt vyžaduje potvrzení e-mailu, zkontroluj schránku.');
      state.authMode = 'signin';
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if(error) throw error;
    }
  }catch(err){
    state.authError = translateAuthError(err.message);
  }
  state.authBusy = false; render();
  return false;
}
function translateAuthError(msg){
  if(!msg) return 'Něco se nepovedlo, zkus to znovu.';
  if(msg.includes('Invalid login credentials')) return 'Nesprávný e-mail nebo heslo.';
  if(msg.includes('User already registered')) return 'Účet s tímto e-mailem už existuje.';
  if(msg.includes('Password should be')) return 'Heslo je příliš krátké (min. 6 znaků).';
  if(msg.includes('Email not confirmed')) return 'Nejdřív potvrď e-mail podle odkazu ve zprávě.';
  return msg;
}
async function signOut(){ await supabase.auth.signOut(); }

/* ============================= DATA LOADING ============================= */
async function loadUserData(){
  try{
    let { data: profile, error: pErr } = await supabase.from('profiles').select('*').eq('id', state.user.id).maybeSingle();
    if(pErr) throw pErr;
    if(!profile){
      const { data: created, error: cErr } = await supabase.from('profiles').insert({ id: state.user.id }).select().single();
      if(cErr) throw cErr;
      profile = created;
    }
    state.settings = { premium: !!profile.premium, monthly_budget: profile.monthly_budget };
  }catch(e){
    toast('Nepodařilo se načíst nastavení účtu.', true);
  }

  try{
    const { data: subs, error: sErr } = await supabase.from('subscriptions').select('*').eq('user_id', state.user.id).order('next_renewal', { ascending:true });
    if(sErr) throw sErr;
    state.subs = subs || [];
    await rollForwardAll();
  }catch(e){
    toast('Nepodařilo se načíst předplatná.', true);
    state.subs = [];
  }
}
async function rollForwardAll(){
  const updates = [];
  state.subs = state.subs.map(s=>{
    let next = s.next_renewal, guard = 0, changed = false;
    while(daysUntil(next) < 0 && guard < 800){ next = addCycle(next, s.cycle); changed = true; guard++; }
    if(changed) updates.push({ id: s.id, next_renewal: next });
    return changed ? Object.assign({}, s, { next_renewal: next }) : s;
  });
  for(const u of updates){
    await supabase.from('subscriptions').update({ next_renewal: u.next_renewal }).eq('id', u.id);
  }
}

/* ============================= TOASTS ============================= */
function toast(msg, isError){
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' err' : '');
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .25s'; el.style.opacity='0'; setTimeout(()=>el.remove(), 260); }, 3200);
}

/* ============================= COMPUTED ============================= */
function computeTotals(){
  const monthly = state.subs.reduce((sum,s)=>sum+monthlyEq(s),0);
  return { monthly, yearly: monthly*12, count: state.subs.length };
}
function upcomingRenewals(days=7){
  return state.subs.map(s=>({ ...s, d: daysUntil(s.next_renewal) })).filter(s=>s.d>=0 && s.d<=days).sort((a,b)=>a.d-b.d);
}
function unusedSubs(){
  return state.subs.filter(s=>{
    if(!s.last_used) return false;
    return -daysUntil(s.last_used) >= 60;
  });
}
function categoryBreakdown(){
  const map = {};
  state.subs.forEach(s=>{ map[s.category] = (map[s.category]||0) + monthlyEq(s); });
  return Object.entries(map).map(([id,val])=>({ id, val, info: catInfo(id) })).sort((a,b)=>b.val-a.val);
}

/* ============================= DASHBOARD ============================= */
function gaugeSVG(pct, hasBudget){
  const p = Math.max(0, Math.min(1, pct));
  const circumference = Math.PI * 46;
  const dash = circumference * p;
  const color = p < 0.75 ? '#7FA98D' : (p < 1 ? '#E8A33D' : '#D9695F');
  return `<svg width="120" height="72" viewBox="0 0 120 72">
    <path d="M 14 60 A 46 46 0 0 1 106 60" fill="none" stroke="#DCD4BC" stroke-width="9" stroke-linecap="round"/>
    ${hasBudget ? `<path d="M 14 60 A 46 46 0 0 1 106 60" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${dash} ${circumference}"/>` : ''}
    <text x="60" y="52" text-anchor="middle" font-family="IBM Plex Mono" font-size="15" font-weight="600" fill="#12171B">${hasBudget? Math.round(p*100)+'%':'—'}</text>
  </svg>`;
}
function viewDashboard(){
  const t = computeTotals();
  const hasBudget = !!(state.settings.monthly_budget && state.settings.monthly_budget>0);
  const pct = hasBudget ? t.monthly / state.settings.monthly_budget : 0;
  const upcoming = upcomingRenewals(7);

  const unused = unusedSubs();

  if(state.subs.length===0){
    return `<div class="topbar"><div><div class="page-title">Přehled</div><div class="page-sub">Vítej v SubHlídači — dej si pořádek do předplatných.</div></div></div>${emptyState()}`;
  }

  return `
    <div class="topbar">
      <div><div class="page-title">Přehled</div><div class="page-sub">Stav tvých předplatných k ${fmtDate(todayStr())}.</div></div>
      <button class="btn btn-primary" onclick="window.__app.openAddEdit()">${ICONS.plus} Přidat předplatné</button>
    </div>

          <div class="receipt-sub">≈ ${fmtMoney(t.yearly)} ročně · ${t.count} aktivních položek</div>
        </div>
        <div class="gauge-wrap">
          ${gaugeSVG(pct, hasBudget)}
          <div class="gauge-caption">${hasBudget ? `Limit ${fmtMoney(state.settings.monthly_budget)}/měs.` : 'Nastav si měsíční limit v Nastavení a sleduj, jak se plníš.'}</div>
        </div>
      </div>
      <div class="receipt-stats">
        <div><div class="receipt-stat-label">Nejbližší obnovení</div><div class="receipt-stat-val">${upcoming.length ? daysLabel(upcoming[0].d) : '—'}</div></div>
        <div><div class="receipt-stat-label">Tento týden</div><div class="receipt-stat-val">${upcoming.length} položek</div></div>
        <div><div class="receipt-stat-label">Nejdražší položka</div><div class="receipt-stat-val">${state.subs.length ? [...state.subs].sort((a,b)=>monthlyEq(b)-monthlyEq(a))[0].name : '—'}</div></div>
      </div>

    <div class="grid-2">

    <div class="lineitem">
      <div class="stamp" style="background:${catInfo(s.category).color}">${s.name.charAt(0).toUpperCase()}</div>
      <div><div class="li-name">${escapeHTML(s.name)}</div><div class="li-meta">${catInfo(s.category).label} · ${cycleLabel(s.cycle)}</div></div>
      <div class="li-leader"></div>
      <span class="li-tag ${tagClass}">${daysLabel(d)} · ${fmtDate(s.next_renewal)}</span>
      <div class="li-price">${fmtMoney(s.price)}</div>
    </div>`;
}
function emptyState(){
  return `<div class="card empty">${ICONS.calendar}<div class="empty-title">Zatím tu nic není</div><div>Přidej první předplatné a začni sledovat, kolik tě měsíčně stojí.</div>
    <div class="empty-actions"><button class="btn btn-primary" onclick="window.__app.openAddEdit()">${ICONS.plus} Přidat předplatné</button></div></div>`;
}

/* ============================= LIST VIEW ============================= */
function filteredSortedSubs(){
  let list = state.subs.slice();
  if(state.search.trim()){ const q = state.search.trim().toLowerCase(); list = list.filter(s=>s.name.toLowerCase().includes(q)); }
  if(state.filterCategory !== 'all'){ list = list.filter(s=>s.category === state.filterCategory); }
  if(state.sortBy==='renewal') list.sort((a,b)=>daysUntil(a.next_renewal)-daysUntil(b.next_renewal));
  else if(state.sortBy==='price_desc') list.sort((a,b)=>monthlyEq(b)-monthlyEq(a));
  else if(state.sortBy==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'cs'));
  return list;
}
function viewList(){
  return `
    <div class="topbar">
      <div><div class="page-title">Předplatná</div><div class="page-sub">${state.subs.length} celkem ${state.settings.premium?'· Premium (bez limitu)':`· limit ${FREE_LIMIT} ve Free plánu`}</div></div>
      <button class="btn btn-primary" onclick="window.__app.openAddEdit()">${ICONS.plus} Přidat předplatné</button>
    </div>
    <div class="controls-row">
      <div class="search-wrap">${ICONS.search}<input class="input" id="searchInput" placeholder="Hledat podle názvu…" value="${escapeHTML(state.search)}"></div>
      <select class="select" id="catFilter">
        <option value="all">Všechny kategorie</option>
        ${CATEGORIES.map(c=>`<option value="${c.id}" ${state.filterCategory===c.id?'selected':''}>${c.label}</option>`).join('')}
      </select>
      <select class="select" id="sortSelect">
        <option value="renewal" ${state.sortBy==='renewal'?'selected':''}>Podle obnovení</option>
        <option value="price_desc" ${state.sortBy==='price_desc'?'selected':''}>Nejdražší první</option>
        <option value="name" ${state.sortBy==='name'?'selected':''}>Podle názvu</option>
      </select>
    </div>
    <div class="card"><div id="subsList"></div></div>
  `;
}
function attachListControls(){
  renderSubsList();
  document.getElementById('searchInput').addEventListener('input', e=>{ state.search = e.target.value; renderSubsList(); });
  document.getElementById('catFilter').addEventListener('change', e=>{ state.filterCategory = e.target.value; renderSubsList(); });
  document.getElementById('sortSelect').addEventListener('change', e=>{ state.sortBy = e.target.value; renderSubsList(); });
}
function renderSubsList(){
  const el = document.getElementById('subsList');
  const list = filteredSortedSubs();
  if(list.length===0){
    el.innerHTML = state.subs.length===0
      ? `<div class="empty">${ICONS.calendar}<div class="empty-title">Zatím žádná předplatná</div><div>Přidej první a začni sledovat výdaje.</div></div>`
      : `<div class="empty"><div class="empty-title">Nic nenalezeno</div><div>Zkus jiné hledání nebo filtr.</div></div>`;
    return;
  }
  el.innerHTML = list.map(s=>{
    const d = daysUntil(s.next_renewal);
    const tagClass = d<0?'soon':(d<=1?'soon':(d<=3?'warn':''));
    return `
      <div class="lineitem">
        <div class="stamp" style="background:${catInfo(s.category).color}">${s.name.charAt(0).toUpperCase()}</div>
        <div><div class="li-name">${escapeHTML(s.name)}</div><div class="li-meta">${catInfo(s.category).label} · ${cycleLabel(s.cycle)}${s.last_used?` · použito ${fmtDate(s.last_used)}`:''}</div></div>
        <div class="li-leader"></div>
        <span class="li-tag ${tagClass}">${daysLabel(d)}</span>
        <div class="li-price">${fmtMoney(s.price)}</div>
        <div class="li-actions">
          <button class="icon-btn" onclick="window.__app.openAddEdit('${s.id}')" title="Upravit">${ICONS.edit}</button>
          <button class="icon-btn" onclick="window.__app.openDelete('${s.id}')" title="Smazat">${ICONS.trash}</button>
        </div>
      </div>`;
  }).join('');
}

/* ============================= NOTIFICATIONS ============================= */
function viewNotifications(){
  const upcoming = upcomingRenewals(14);
  const unused = unusedSubs();
  return `
    <div class="topbar"><div><div class="page-title">Upozornění</div><div class="page-sub">Co si pohlídat v následujících dnech.</div></div></div>
    <div class="card">
      <div class="card-title">Nadcházející obnovení (14 dní)</div>
      ${upcoming.length ? upcoming.map(s=>`
        <div class="notif">
          <div class="notif-icon" style="background:rgba(232,163,61,0.12); color:var(--amber);">${ICONS.calendar}</div>
          <div><div class="notif-title">${escapeHTML(s.name)} se obnoví ${daysLabel(s.d).toLowerCase()}</div><div class="notif-desc">${fmtDate(s.next_renewal)} · strhne se ${fmtMoney(s.price)}</div></div>
        </div>`).join('') : `<div style="color:var(--text-dim); font-size:13px; padding:6px 0;">Žádná obnovení v nejbližších 14 dnech.</div>`}
    </div>
    <div class="card" style="margin-top:18px;">
      <div class="card-title" style="display:flex;align-items:center;gap:8px;">${ICONS.sparkle} Nevyužívaná předplatná</div>
      ${!state.settings.premium ? `
        <div class="card-desc">Tahle funkce sleduje, co dlouho nepoužíváš, a je součástí Premium.</div>
        <button class="btn btn-ghost btn-sm" onclick="window.__app.openUpgrade()">${ICONS.crown} Odemknout v Premium</button>
      ` : unused.length ? unused.map(s=>`
        <div class="notif">
          <div class="notif-icon" style="background:rgba(217,105,95,0.12); color:var(--coral);">${ICONS.alert}</div>
          <div><div class="notif-title">${escapeHTML(s.name)} — nepoužito ${-daysUntil(s.last_used)} dní</div><div class="notif-desc">Stojí tě ${fmtMoney(monthlyEq(s))} měsíčně. Zvaž zrušení.</div></div>
        </div>`).join('') : `<div style="color:var(--text-dim); font-size:13px; padding:6px 0;">Zatím nic podezřelého.</div>`}
    </div>
  `;
}

/* ============================= SETTINGS ============================= */
function viewSettings(){
  return `
    <div class="topbar"><div><div class="page-title">Nastavení</div><div class="page-sub">Plán, limit a data.</div></div></div>
    <div class="card" style="margin-bottom:18px;">
      <div class="card-title">Měsíční limit</div>
      <div class="card-desc">Nastav si cíl a na Přehledu uvidíš, kolik z něj čerpáš.</div>
      <div class="field" style="max-width:220px;"><label>Limit v Kč / měsíc</label>
        <input class="input" type="number" min="0" id="budgetInput" placeholder="např. 2000" value="${state.settings.monthly_budget||''}"></div>
      <button class="btn btn-ghost btn-sm" onclick="window.__app.saveBudget()">Uložit limit</button>
    </div>
    <div class="card" style="margin-bottom:18px;">
      <div class="card-title">Plán</div>
      <div class="kv-row">
        <div><div class="kv-label">${state.settings.premium ? 'Premium' : 'Free'} plán</div>
        <div class="kv-desc">${state.settings.premium ? 'Neomezený počet předplatných, přehled úspor a export dat.' : `Do ${FREE_LIMIT} předplatných, upozornění na obnovení.`}</div></div>
        ${state.settings.premium
          ? `<button class="btn btn-ghost btn-sm" onclick="window.__app.togglePremium(false)">Zrušit Premium</button>`
          : `<button class="btn btn-primary btn-sm" onclick="window.__app.openUpgrade()">${ICONS.crown} Upgradovat</button>`}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Data</div>
      <div class="kv-row">
        <div><div class="kv-label">Exportovat do CSV</div><div class="kv-desc">Stáhni si všechna svá předplatná jako tabulku. ${state.settings.premium?'':'(Premium)'}</div></div>
        <button class="btn btn-ghost btn-sm" onclick="window.__app.exportCSV()" ${state.settings.premium?'':'disabled'}>${ICONS.download} Export</button>
      </div>
      <div class="kv-row">
        <div><div class="kv-label">Smazat všechna data</div><div class="kv-desc">Nevratně odstraní všechna uložená předplatná.</div></div>
        <button class="btn btn-danger btn-sm" onclick="window.__app.confirmWipe()">Smazat vše</button>
      </div>
    </div>
  `;
}
async function saveBudget(){
  const v = parseFloat(document.getElementById('budgetInput').value);
  const budget = (v && v>0) ? v : null;
  const { error } = await supabase.from('profiles').update({ monthly_budget: budget }).eq('id', state.user.id);
  if(error){ toast('Uložení limitu se nezdařilo.', true); return; }
  state.settings.monthly_budget = budget;
  toast('Limit uložen');
  render();
}
function exportCSV(){
  if(!state.settings.premium) return;
  const rows = [['Název','Cena','Cyklus','Kategorie','Další obnovení','Naposledy použito','Poznámka']];
  state.subs.forEach(s=>rows.push([s.name, s.price, cycleLabel(s.cycle), catInfo(s.category).label, s.next_renewal, s.last_used||'', (s.notes||'').replace(/\n/g,' ')]));
  const csv = rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'subhlidac-export.csv';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Export stažen');
}
function confirmWipe(){
  showModal(`
    <div class="modal-head"><div class="modal-title">Smazat vše?</div><button class="icon-btn" onclick="window.__app.closeModal()">${ICONS.x}</button></div>
    <div style="font-size:13.5px; color:var(--text-dim); margin-bottom:6px;">Tahle akce nevratně smaže všechna tvá předplatná.</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window.__app.closeModal()">Zrušit</button>
      <button class="btn btn-danger" onclick="window.__app.wipeAll()">Ano, smazat vše</button>
    </div>`);
}
async function wipeAll(){
  const { error } = await supabase.from('subscriptions').delete().eq('user_id', state.user.id);
  if(error){ toast('Smazání se nezdařilo.', true); return; }
  state.subs = [];
  closeModal(); toast('Data smazána'); render();
}

/* ============================= MODAL: ADD / EDIT ============================= */
let editingCategory = null;
function openAddEdit(id){
  if(!id && !state.settings.premium && state.subs.length >= FREE_LIMIT){ openUpgrade(); return; }
  const sub = id ? state.subs.find(s=>s.id===id) : null;
  editingCategory = sub ? sub.category : CATEGORIES[0].id;
  showModal(formModalHTML(sub));
}
function formModalHTML(sub){
  const isEdit = !!sub;
  return `
    <div class="modal-head"><div class="modal-title">${isEdit ? 'Upravit předplatné' : 'Nové předplatné'}</div><button class="icon-btn" onclick="window.__app.closeModal()">${ICONS.x}</button></div>
    <form onsubmit="return window.__app.submitSubForm(event, ${isEdit ? `'${sub.id}'` : 'null'})">
      <div class="field"><label>Název</label><input class="input" name="name" required placeholder="např. Netflix" value="${sub?escapeHTML(sub.name):''}"></div>
      <div class="field-row">
        <div class="field"><label>Cena (Kč)</label><input class="input" name="price" type="number" step="0.01" min="0" required value="${sub?sub.price:''}"></div>
        <div class="field"><label>Frekvence</label><select class="select" name="cycle">${CYCLES.map(c=>`<option value="${c.id}" ${sub&&sub.cycle===c.id?'selected':''}>${c.label}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Kategorie</label>
        <div class="cat-picker" id="catPicker">
          ${CATEGORIES.map(c=>`<button type="button" class="cat-chip ${editingCategory===c.id?'sel':''}" onclick="window.__app.pickCategory('${c.id}', event)"><span class="dot" style="background:${c.color}"></span>${c.label}</button>`).join('')}
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Další obnovení</label><input class="input" name="nextRenewal" type="date" required value="${sub?sub.next_renewal:todayStr()}"></div>
        <div class="field"><label>Naposledy použito <span style="color:var(--text-faint)">(nepovinné)</span></label><input class="input" name="lastUsed" type="date" value="${sub&&sub.last_used?sub.last_used:''}"></div>
      </div>
      <div class="field"><label>Poznámka <span style="color:var(--text-faint)">(nepovinné)</span></label><textarea name="notes" placeholder="např. sdílený rodinný účet">${sub&&sub.notes?escapeHTML(sub.notes):''}</textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="window.__app.closeModal()">Zrušit</button>
        <button type="submit" class="btn btn-primary">${isEdit?'Uložit změny':'Přidat předplatné'}</button>
      </div>
    </form>`;
}
function pickCategory(id, ev){
  editingCategory = id;
  document.querySelectorAll('#catPicker .cat-chip').forEach(el=>el.classList.remove('sel'));
  if(ev && ev.currentTarget) ev.currentTarget.classList.add('sel');
}
async function submitSubForm(e, id){
  e.preventDefault();
  const f = e.target;
  const payload = {
    name: f.name.value.trim(),
    price: parseFloat(f.price.value),
    cycle: f.cycle.value,
    category: editingCategory,
    next_renewal: f.nextRenewal.value,
    last_used: f.lastUsed.value || null,
    notes: f.notes.value.trim(),
  };
  if(!payload.name || isNaN(payload.price) || !payload.next_renewal) return false;

  if(id){
    const { error } = await supabase.from('subscriptions').update(payload).eq('id', id);
    if(error){ toast('Uložení se nezdařilo.', true); return false; }
    state.subs = state.subs.map(s=>s.id===id ? Object.assign({}, s, payload) : s);
    toast('Předplatné upraveno');
  } else {
    const { data, error } = await supabase.from('subscriptions').insert(Object.assign({ user_id: state.user.id }, payload)).select().single();
    if(error){ toast('Přidání se nezdařilo.', true); return false; }
    state.subs.push(data);
    toast('Předplatné přidáno');
  }
  closeModal(); render();
  return false;
}

/* ============================= MODAL: DELETE ============================= */
function openDelete(id){
  const sub = state.subs.find(s=>s.id===id);
  if(!sub) return;
  showModal(`
    <div class="modal-head"><div class="modal-title">Smazat "${escapeHTML(sub.name)}"?</div><button class="icon-btn" onclick="window.__app.closeModal()">${ICONS.x}</button></div>
    <div style="font-size:13.5px; color:var(--text-dim); margin-bottom:6px;">Tuto akci nelze vrátit zpět.</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window.__app.closeModal()">Zrušit</button>
      <button class="btn btn-danger" onclick="window.__app.deleteSub('${id}')">Smazat</button>
    </div>`);
}
async function deleteSub(id){
  const { error } = await supabase.from('subscriptions').delete().eq('id', id);
  if(error){ toast('Smazání se nezdařilo.', true); return; }
  state.subs = state.subs.filter(s=>s.id!==id);
  closeModal(); toast('Předplatné smazáno'); render();
}

/* ============================= MODAL: UPGRADE ============================= */
function openUpgrade(){
  showModal(`
    <div class="modal-head"><div class="modal-title">Přejít na Premium</div><button class="icon-btn" onclick="window.__app.closeModal()">${ICONS.x}</button></div>
    <div class="plan-cards">
      <div class="plan-card"><h4>Free</h4><div class="plan-price">0 Kč</div>
        <ul><li>${ICONS.check} Do ${FREE_LIMIT} předplatných</li><li>${ICONS.check} Upozornění na obnovení</li><li>${ICONS.check} Přehled výdajů</li></ul></div>
      <div class="plan-card hi"><h4>Premium</h4><div class="plan-price">49 Kč / měsíc</div>
        <ul><li>${ICONS.check} Neomezený počet předplatných</li><li>${ICONS.check} Přehled nevyužívaných předplatných</li><li>${ICONS.check} Export dat do CSV</li></ul></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="window.__app.togglePremium(true)">${ICONS.crown} Aktivovat Premium</button>
    <div class="demo-note">Tohle je funkční demo aktivace uložená přímo v tvém Supabase účtu — zatím bez napojení na skutečnou platební bránu. Pro ostrý provoz stačí toto tlačítko nahradit voláním na Stripe Checkout a označit premium přes webhook.</div>
  `);
}
async function togglePremium(on){
  const { error } = await supabase.from('profiles').update({ premium: on }).eq('id', state.user.id);
  if(error){ toast('Změna plánu se nezdařila.', true); return; }
  state.settings.premium = on;
  closeModal(); toast(on ? 'Premium aktivováno' : 'Premium zrušeno'); render();
}

/* ============================= MODAL HELPERS ============================= */
function showModal(html){
  document.getElementById('modalRoot').innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this) window.__app.closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

/* ============================= EXPOSE HANDLERS ============================= */
window.__app = {
  setView, openAddEdit, pickCategory, submitSubForm, openDelete, deleteSub,
  openUpgrade, togglePremium, closeModal, saveBudget, exportCSV, confirmWipe,
  wipeAll, signOut, setAuthMode, handleAuthSubmit,
};

initAuth();
</script>
